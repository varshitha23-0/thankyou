<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaswara 2026 - Thank You</title>
    <!-- anime-style font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', cursive, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #d14781; /* darker pink for better contrast */
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
            color: white;
            background: rgba(0, 0, 0, 0.4); /* semi-transparent dark box */
            border-radius: 20px;
            margin: 20px auto;
            max-width: 90%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .tagline {
            font-size: 1.2em;
            opacity: 0.95;
            font-style: italic;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .thank-you-section {
            background-image: url('thankyou.jpg');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 40px;
            animation: slideIn 0.8s ease-out;
            position: relative;
        }

        .thank-you-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 15px;
            z-index: 1;
        }

        .thank-you-section > * {
            position: relative;
            z-index: 2;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thank-you-section h1 {
            font-size: 2.5em;
            color: #280115; /* brighter pink */
            margin-bottom: 20px;
        }

        .thank-you-section p {
            font-size: 1.1em;
            color: #3d021a; /* match body color */
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .highlights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .highlight-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .highlight-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .highlight-card h3 {
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .highlight-card p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95em;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .memories-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .memories-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .memory-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .memory-item:hover {
            background: #f0f1ff;
            transform: translateX(5px);
        }

        .memory-item p {
            color: #555;
            font-style: italic;
        }

        footer {
            background: rgba(0, 0, 0, 0.1);
            color: #d14781;
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-links a {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            text-decoration: none;
            color: white;
            line-height: 40px;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background: white;
            color: #667eea;
            transform: scale(1.1);
        }

        /* Card reveal styles */
        .card-reveal-section {
            margin: 40px 0;
            text-align: center;
        }

        .card-reveal-section h1 {
            color: #4B0082;
            margin-bottom: 20px;
        }

        #card {
            width: 300px;
            margin-top: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        .card-reveal-section button {
            margin-top: 30px;
            padding: 10px 20px;
            border: none;
            background: #ff69b4;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        .card-reveal-section button:hover {
            background: #ff4fa3;
        }

        @media (max-width: 768px) {
            header {
                padding: 40px 20px 30px;
            }

            .logo {
                font-size: 2em;
            }

            .thank-you-section {
                padding: 40px 25px;
            }

            .thank-you-section h1 {
                font-size: 2em;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">BHASWARA AIML & IOT 2026</div>
        <div class="tagline">Thank You for Being Part of the Magic!</div>
    </header>

    <div class="container">
        <div class="thank-you-section">
            <h1>We are Grateful!</h1>
           <h1 style="text-align:left;">Mission Complete! ✨</h1>
           <p style="text-align:left;">
                  Thank you for participating in Bhaswara AIML & IoT 2026.
                  Your energy and enthusiasm made this journey truly memorable.
            </p>
            
        </div>

        <!-- Card Reveal Section -->
        <div class="card-reveal-section">
            <h1>🎌 Your Anime Card</h1>
            <img id="card" src="">
        </div>



    <footer>
        <p>&copy; BHASWARA AIML & IOT 2026. All Rights Reserved.</p>
    </footer>

    <script>
        const cards = [
            "cards/card1.png",
            "cards/card2.png",
        ];

        function showRandomCard() {
            let shown = JSON.parse(localStorage.getItem('shownCards') || '[]');
            let available = cards.filter(card => !shown.includes(card));
            if (available.length === 0) {
                // Reset if all cards have been shown
                localStorage.removeItem('shownCards');
                available = cards;
                shown = [];
            }
            let randomIndex = Math.floor(Math.random() * available.length);
            let selectedCard = available[randomIndex];
            document.getElementById("card").src = selectedCard;
            shown.push(selectedCard);
            localStorage.setItem('shownCards', JSON.stringify(shown));
        }

        window.onload = showRandomCard;
    </script>

    <script>
        // Scroll-based background movement
        window.addEventListener('scroll', function() {
            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollY / maxScroll) * 100;
            
            // Move background based on scroll position (0% to 100%)
            const yOffset = (scrollPercent / 100) * 50; // 50px max movement
            document.body.style.backgroundPosition = `center ${yOffset}%`;
        });

        function scrollToMemories() {
            const memoriesSection = document.getElementById('memories');
            memoriesSection.scrollIntoView({ behavior: 'smooth' });
        }

        function shareEvent() {
            const text = "I had an amazing time at Bhaswara 2026! Check out the event here!";
            if (navigator.share) {
                navigator.share({
                    title: 'Bhaswara 2026',
                    text: text,
                    url: window.location.href
                });
            } else {
                alert(text + '\n' + window.location.href);
            }
        }
    </script>
</body>
</html>
